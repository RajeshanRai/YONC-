{% for reply in replies %}
    <div class="mt-3 ml-4">
        {% include 'community/_comment.html' with comment=reply %}
    </div>
{% empty %}
    <p class="text-text-secondary">No replies.</p>
{% endfor %}

{% if has_next and next_page_number %}
    <div class="mt-2 ml-4">
        <button class="text-sm text-accent-blue load-more-replies" data-next-page="{{ next_page_number }}">Load more replies</button>
    </div>
{% endif %}
