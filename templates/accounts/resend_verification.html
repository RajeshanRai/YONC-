{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg bg-bg-navy border border-border-subtle rounded-3xl p-10 shadow-lg">
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 w-14 h-14 rounded-full bg-accent-blue/10 flex items-center justify-center">
                <i class="fa-solid fa-envelope-open-text text-accent-blue text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-text-primary">Resend Verification Email</h1>
            <p class="text-text-secondary mt-2">Enter the email address used to create your account, and we'll send another verification code.</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-sm font-medium text-text-secondary mb-2">Email Address</label>
                <input type="email" name="email" id="id_email" required
                       class="w-full px-4 py-3 rounded-lg bg-bg-surface border border-border-subtle text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue transition-colors"
                       placeholder="your@email.com">
            </div>

            <button type="submit" class="w-full py-3 bg-accent-blue hover:bg-blue-600 text-white rounded-lg font-semibold transition-all">
                Send Verification Code
            </button>
        </form>
    </div>
</section>
{% endblock %}
